name: Deploy to GKE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
      
      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build and push images
        run: |
          docker build --platform linux/amd64 -f services/api-service/Dockerfile -t asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/api-service:latest .
          docker build --platform linux/amd64 -f services/feed-service/Dockerfile -t asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/feed-service:latest .
          docker build --platform linux/amd64 -f services/notification-service/Dockerfile -t asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/notification-service:latest .
          docker push asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/api-service:latest
          docker push asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/feed-service:latest
          docker push asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/notification-service:latest


      - name: Get GKE credentials
        run: gcloud container clusters get-credentials feed-system-cluster --zone=asia-south1-a

      - name: Deploy to GKE
        run: |
          kubectl rollout restart deployment feed-service api-service notification-service
