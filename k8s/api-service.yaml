apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
        - name: api-service
          image: asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/api-service:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: feed-system-config
            - secretRef:
                name: feed-system-secret

---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  type: LoadBalancer
  selector:
    app: api-service
  ports:
    - port: 80
      targetPort: 3000

