apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: asia-south1-docker.pkg.dev/realtime-feed-system/feed-system-repo/notification-service:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: feed-system-config
            - secretRef:
                name: feed-system-secret

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: LoadBalancer
  selector:
    app: notification-service
  ports:
    - port: 80
      targetPort: 3001

